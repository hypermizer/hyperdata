name: Deploy Supabase listener

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - "scripts/**"
      - ".github/workflows/deploy-supabase.yml"

permissions:
  contents: read

concurrency:
  group: supabase-production
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_ID: itheknkmuutquriojdzt
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Apply migrations
        run: node scripts/deploy-supabase-migrations.mjs
      - name: Configure function secrets
        run: |
          supabase secrets set --project-ref "$SUPABASE_PROJECT_ID" \
            MONITOR_SECRET="$MONITOR_SECRET" DELIVERY_ENABLED="$DELIVERY_ENABLED" \
            PAPER_SCHEDULER_SECRET="$PAPER_SCHEDULER_SECRET" PAPER_TRADING_ENABLED="$PAPER_TRADING_ENABLED" \
            ZOHO_SMTP_HOST="smtp.zoho.com" ZOHO_SMTP_USER="$SMTP_USERNAME" \
            ZOHO_SMTP_PASSWORD="$SMTP_PASSWORD" ALERT_EMAIL="$ALERT_EMAIL" \
            TWILIO_ACCOUNT_SID="$TWILIO_ACCOUNT_SID" TWILIO_AUTH_TOKEN="$TWILIO_AUTH_TOKEN" \
            TWILIO_FROM_NUMBER="$TWILIO_FROM" ALERT_PHONE="$ALERT_SMS_TO"
        env:
          MONITOR_SECRET: ${{ secrets.MONITOR_SECRET }}
          DELIVERY_ENABLED: ${{ vars.DELIVERY_ENABLED || 'false' }}
          PAPER_SCHEDULER_SECRET: ${{ secrets.PAPER_SCHEDULER_SECRET }}
          PAPER_TRADING_ENABLED: ${{ vars.PAPER_TRADING_ENABLED || 'false' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          ALERT_SMS_TO: ${{ secrets.ALERT_SMS_TO }}
      - name: Deploy functions
        run: |
          supabase functions deploy monitor-market --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy rebuild-calibrations --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy deliver-alerts --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy paper-command --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy process-paper --project-ref "$SUPABASE_PROJECT_ID"
      - name: Configure scheduler
        run: node scripts/configure-supabase-runtime.mjs
        env:
          MONITOR_SECRET: ${{ secrets.MONITOR_SECRET }}
          PAPER_SCHEDULER_SECRET: ${{ secrets.PAPER_SCHEDULER_SECRET }}
          PAPER_TRADING_ENABLED: ${{ vars.PAPER_TRADING_ENABLED || 'false' }}
