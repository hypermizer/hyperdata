name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm run test:edge
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      - run: npm run test:db
