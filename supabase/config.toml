project_id = "hyperdata"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://hypermizer.github.io/hyperdata/"]

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.monitor-market]
verify_jwt = false

[functions.rebuild-calibrations]
verify_jwt = false

[functions.deliver-alerts]
verify_jwt = false

[functions.paper-command]
verify_jwt = false
