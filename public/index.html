<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Personal Hyperliquid price monitor and alert utility." />
    <meta name="theme-color" content="#ffffff" />
    <title>Hyperdata</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Hyperdata</h1>
        <p><span id="connection-label">Loading market data</span> · updated <time id="last-sync">—</time></p>
        <div class="tabs" role="tablist" aria-label="Hyperdata views">
          <button id="watchlist-tab" type="button" role="tab" aria-selected="true" aria-controls="watchlist-view" data-tab="watchlist">Watchlist</button>
          <button id="alerts-tab" type="button" role="tab" aria-selected="false" aria-controls="alerts-view" data-tab="alerts">Alerts</button>
        </div>
      </header>

      <section id="watchlist-view" role="tabpanel" aria-labelledby="watchlist-tab">
        <div class="section-header">
          <h2 id="watchlist-heading">Watchlist</h2>
        </div>

        <div id="market-list" class="market-list" aria-live="polite">Loading…</div>
      </section>

      <section id="alerts-view" role="tabpanel" aria-labelledby="alerts-tab" hidden>
        <div class="section-header">
          <h2 id="alerts-heading">Alerts</h2>
          <span class="hint">checked every 5 min</span>
        </div>

        <form id="alert-form" class="inline-form">
          <label for="alert-asset">Create alert</label>
          <select id="alert-asset" name="asset" required>
            <option value="">Choose asset</option>
          </select>
          <select id="alert-direction" name="direction" aria-label="Alert direction">
            <option value="above">above</option>
            <option value="below">below</option>
          </select>
          <input id="alert-target" name="target" type="number" min="0.00000001" step="any" placeholder="Target price" required />
          <select id="alert-delivery" name="delivery" aria-label="Alert delivery">
            <option value="email">email</option>
            <option value="sms">text</option>
          </select>
          <button type="submit">Create</button>
        </form>
        <p id="alert-message" class="message" role="alert"></p>
        <p class="hint">Create opens a prefilled GitHub issue. Submit it to activate; close it to cancel.</p>

        <div class="section-header active-header">
          <h3>Active</h3>
          <span id="alert-count" class="hint">—</span>
        </div>
        <div id="alert-list" class="alert-list"><p class="hint">Loading…</p></div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
